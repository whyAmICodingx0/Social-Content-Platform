name: social-content-platform      # 明確指定專案名稱，不再依賴資料夾名

services:
  db:
    image: postgres:17
    container_name: social_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: social_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: