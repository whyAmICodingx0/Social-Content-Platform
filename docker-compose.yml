name: social-content-platform      # 明確指定專案名稱，不再依賴資料夾名

services:
  db:
    image: postgres:17
    container_name: social_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: social_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: social_redis
    ports:
      - "6379:6379"
    # 刻意不掛 volume:session / state / pending 都是可拋棄狀態(見第 1.2 節)

volumes:
  db_data: