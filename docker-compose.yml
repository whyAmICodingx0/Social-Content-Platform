services:
  db:
    image: postgres:17
    container_name: social_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword      # 本機開發用；正式環境絕不能這樣寫死
      POSTGRES_DB: social_dev             # 容器首次啟動時會自動建立這個 database
    ports:
      - "5432:5432"                       # 本機 5432 → 容器 5432
    volumes:
      - db_data:/var/lib/postgresql/data  # 資料存在 named volume，容器刪掉資料還在

volumes:
  db_data: